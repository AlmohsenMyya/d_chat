name: Build & Release APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Java
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # 3️⃣ Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 4️⃣ Dependencies
      - name: Install dependencies
        run: flutter pub get

      # 5️⃣ Build APK (release)
      - name: Build APK
        run: flutter build apk --release

      # 6️⃣ Rename APK 🔥
      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
          d-chat-${{ github.event.inputs.version_name }}.apk

      # 7️⃣ Create Release + Upload APK 🔥🔥
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_name }}
          name: D-Chat ${{ github.event.inputs.version_name }}
          files: d-chat-${{ github.event.inputs.version_name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}